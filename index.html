<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>끝말잇기 게임</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <button id="theme-toggle" aria-label="테마 전환">🌓</button>
        <h1>끝말잇기 게임</h1>
        <div id="word-display">
            현재 단어: <span id="current-word">시작</span>
        </div>
        <div id="input-area">
            <input type="text" id="word-input" placeholder="다음 단어를 입력하세요..." autofocus>
            <button id="submit-button">입력</button>
        </div>
        <p id="message"></p>
        <div id="history-container">
            <h2>참여 기록</h2>
            <ul id="word-history"></ul>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
