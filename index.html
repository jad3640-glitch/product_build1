<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>끝말잇기 게임 & 제휴문의</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main-wrapper">
        <div id="game-container">
            <button id="theme-toggle" aria-label="테마 전환">🌓</button>
            <h1>끝말잇기 게임</h1>
            <div id="word-display">
                현재 단어: <span id="current-word">시작</span>
            </div>
            <div id="input-area">
                <input type="text" id="word-input" placeholder="다음 단어를 입력하세요..." autofocus>
                <button id="submit-button">입력</button>
            </div>
            <p id="message"></p>
            <div id="history-container">
                <h2>참여 기록</h2>
                <ul id="word-history"></ul>
            </div>
            <button id="form-toggle-btn">제휴 문의하기</button>
        </div>

        <div id="form-container" class="hidden">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/mkopdglk" method="POST">
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="email" placeholder="example@domain.com" required>
                </div>
                <div class="form-group">
                    <label for="subject">문의 제목</label>
                    <input type="text" id="subject" name="subject" placeholder="문의 제목을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="message-text">문의 내용</label>
                    <textarea id="message-text" name="message" placeholder="상세 내용을 입력해주세요" required></textarea>
                </div>
                <button type="submit" id="form-submit-btn">문의 보내기</button>
                <button type="button" id="form-close-btn">닫기</button>
            </form>
        </div>

        <div id="disqus-container">
            <div id="disqus_thread"></div>

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
</body>

</html>
